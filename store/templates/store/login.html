{% extends 'store/base.html' %} {% block content %}

<link rel="stylesheet" href="/static/store/log.css" />

<form class="login-form" method="POST">
  {% csrf_token %}
  <h1>Login</h1>

  <input
    type="text"
    name="username"
    class="form-control mb-3 etremail"
    placeholder="Enter Username"
    required
  />

  <input
    type="password"
    name="password"
    class="form-control mb-3 pswrd"
    placeholder="Enter Password"
    required
  />

  <button class="btn btn-primary w-100 logbut">Login</button>

  <div class="text-center mt-3">
    <a href="{% url 'forgot_password' %}" class="text-decoration-none">
      Forgot Password?
    </a>
  </div>

  <!-- Divider -->
  <div class="text-center mt-3">
    <p>OR</p>
  </div>

  <!-- Google Login Button -->
  <a href="{% url 'google_login' %}" class="btn btn-danger w-100">
    Login with Google
  </a>
</form>

{% endblock %}
